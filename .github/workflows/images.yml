name: CD - Ubuntu images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

concurrency:
  group: ubuntu-images
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: noble
            release: ubuntu24.04
          - variant: resolute
            release: ubuntu26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set build tag
        id: build
        run: |
          echo "tag=$(date -u +%Y%m%d).${GITHUB_RUN_NUMBER}-${{ matrix.variant }}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: ./src/images/base-ubuntu
          build-args: VARIANT=${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/boblangley/devcontainers/base:${{ matrix.variant }}
            ghcr.io/boblangley/devcontainers/base:${{ matrix.release }}
            ghcr.io/boblangley/devcontainers/base:${{ steps.build.outputs.tag }}
          labels: |
            org.opencontainers.image.created=${{ steps.build.outputs.created }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Attest image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/boblangley/devcontainers/base
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

  arm64-smoke:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      packages: read
    strategy:
      matrix:
        variant: [noble, resolute]
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify arm64 init and command
        run: |
          image="ghcr.io/boblangley/devcontainers/base:${{ matrix.variant }}"
          docker pull --platform linux/arm64 "$image"
          docker run --rm --platform linux/arm64 "$image" sh -c 'test "$(uname -m)" = aarch64 && tr "\0" " " </proc/1/cmdline | grep -q s6-svscan'

  cleanup:
    needs: arm64-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Retain twelve dated builds per variant
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/cleanup-ghcr-images.sh --execute
