name: CD - T3 Code web image

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: t3code-web-image
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.versions.outputs.t3code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Read versions
        id: versions
        shell: bash
        run: |
          set -a
          . src/images/t3code-web/versions.env
          set +a
          printf '%s\n' \
          "t3code=${T3CODE_VERSION}" \
          "source_sha256=${T3CODE_SOURCE_SHA256}" \
          "vite_plus=${VITE_PLUS_VERSION}" \
          "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: ./src/images/t3code-web
          build-args: |
            T3CODE_VERSION=${{ steps.versions.outputs.t3code }}
            T3CODE_SOURCE_SHA256=${{ steps.versions.outputs.source_sha256 }}
            VITE_PLUS_VERSION=${{ steps.versions.outputs.vite_plus }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/boblangley/devcontainers/t3code-web:${{ steps.versions.outputs.t3code }}
            ghcr.io/boblangley/devcontainers/t3code-web:latest
          labels: |
            org.opencontainers.image.created=${{ steps.versions.outputs.created }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Attest image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/boblangley/devcontainers/t3code-web
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

  arm64-smoke:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify arm64 image
        run: |
          image="ghcr.io/boblangley/devcontainers/t3code-web:${{ needs.publish.outputs.version }}"
          docker pull --platform linux/arm64 "$image"
          docker run --rm --platform linux/arm64 "$image" sh -c 'test "$(uname -m)" = aarch64 && test -f /usr/share/nginx/html/index.html'
