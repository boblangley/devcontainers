name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-features-autogenerated:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - codex-cli
          - claude-code-cli
        baseImage:
          - debian:bookworm
          - mcr.microsoft.com/devcontainers/base:noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test autogenerated scenario
        run: ./scripts/test-features.sh --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.baseImage }}

  test-feature-scenarios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - t3code-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test declared scenarios
        run: ./scripts/test-features.sh -f ${{ matrix.feature }} --skip-autogenerated --skip-duplicated

  test-t3code-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test autogenerated scenario
        run: ./scripts/test-features.sh --skip-scenarios -f t3code-server -i ghcr.io/boblangley/devcontainers/base:noble

  test-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [noble, resolute]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./src/images/base-ubuntu
          build-args: VARIANT=${{ matrix.variant }}
          load: true
          tags: devcontainers-base:${{ matrix.variant }}

      - name: Test s6 runtime
        run: ./src/images/base-ubuntu/test/test.sh devcontainers-base:${{ matrix.variant }}

  test-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate metadata and substitutions
        run: |
          jq -e '.id == "ubuntu" and .version == "1.0.0" and .options.imageVariant.default == "noble"' src/templates/ubuntu/devcontainer-template.json
          for variant in noble resolute; do
            sed "s/\${templateOption:imageVariant}/${variant}/g" src/templates/ubuntu/.devcontainer/devcontainer.json | jq -e --arg variant "$variant" '.image == ("ghcr.io/boblangley/devcontainers/base:" + $variant)'
          done
