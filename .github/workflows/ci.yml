name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-features-autogenerated:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - codex-cli
          - claude-code-cli
        baseImage:
          - debian:bookworm
          - mcr.microsoft.com/devcontainers/base:noble
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test autogenerated scenario
        run: ./scripts/test-features.sh --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.baseImage }}

  test-feature-scenarios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - t3code-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test declared scenarios
        run: ./scripts/test-features.sh -f ${{ matrix.feature }} --skip-autogenerated --skip-duplicated

  test-t3code-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test autogenerated scenario
        run: ./scripts/test-features.sh --skip-scenarios -f t3code-server -i ghcr.io/boblangley/devcontainers/base:noble

  test-s6-features:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - go
          - sshd
          - docker-outside-of-docker
          - docker-in-docker
        baseImage:
          - ghcr.io/boblangley/devcontainers/base:noble
        include:
          - feature: docker-outside-of-docker
            baseImage: ghcr.io/boblangley/devcontainers/base:resolute
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test s6-compatible Feature
        run: ./scripts/test-features.sh --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.baseImage }}

  test-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [noble, resolute]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./src/images/base-ubuntu
          build-args: VARIANT=${{ matrix.variant }}
          load: true
          tags: devcontainers-base:${{ matrix.variant }}

      - name: Test s6 runtime
        run: ./src/images/base-ubuntu/test/test.sh devcontainers-base:${{ matrix.variant }}

      - name: Verify Moby remains an explicit unsupported opt-in
        if: matrix.variant == 'resolute'
        run: ./scripts/test-moby-opt-in.sh devcontainers-base:resolute

  test-t3code-web-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read versions
        shell: bash
        run: |
          set -a
          . src/images/t3code-web/versions.env
          set +a
          printf '%s\n' \
          "T3CODE_VERSION=${T3CODE_VERSION}" \
          "T3CODE_SOURCE_SHA256=${T3CODE_SOURCE_SHA256}" \
          "VITE_PLUS_VERSION=${VITE_PLUS_VERSION}" >> "$GITHUB_ENV"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./src/images/t3code-web
          build-args: |
            T3CODE_VERSION=${{ env.T3CODE_VERSION }}
            T3CODE_SOURCE_SHA256=${{ env.T3CODE_SOURCE_SHA256 }}
            VITE_PLUS_VERSION=${{ env.VITE_PLUS_VERSION }}
          load: true
          tags: devcontainers-t3code-web:test

      - name: Test image
        run: ./src/images/t3code-web/test/test.sh devcontainers-t3code-web:test

  test-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate metadata and substitutions
        run: |
          jq -e '.id == "ubuntu" and .version == "1.0.0" and .options.imageVariant.default == "noble"' src/templates/ubuntu/devcontainer-template.json
          for variant in noble resolute; do
            sed "s/\${templateOption:imageVariant}/${variant}/g" src/templates/ubuntu/.devcontainer/devcontainer.json | jq -e --arg variant "$variant" '.image == ("ghcr.io/boblangley/devcontainers/base:" + $variant)'
          done
